<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f4f4f0;color:#1a1a18}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:14px}
  .header{background:#fff;border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border:1px solid #e8e8e4}
  .badge-g{background:#EAF3DE;color:#27500A;font-size:11px;font-weight:700;padding:5px 14px;border-radius:8px}
  .badge-r{background:#FCEBEB;color:#A32D2D;font-size:11px;font-weight:700;padding:5px 14px;border-radius:8px}
  .card{background:#fff;border-radius:14px;padding:14px 16px;border:1px solid #e8e8e4}
  .ct{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .tab-bar{display:flex;border-bottom:2px solid #e8e8e4;margin-bottom:14px}
  .tab-btn{padding:8px 24px;font-size:13px;font-weight:700;color:#aaa;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
  .tab-btn.active{color:#1a1a18;border-bottom-color:#1a1a18}
  .tab-panel{display:none}.tab-panel.active{display:flex;flex-direction:column;gap:14px}
  .cell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
  .cell-btn{border:1px solid #e8e8e4;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
  .cell-btn:hover{border-color:#1a1a18;background:#f8f8f6}
  .cell-btn.active{border-color:#1a1a18;background:#1a1a18;color:#fff}
  .cell-btn .cn{font-size:12px;font-weight:700}
  .cell-btn .ca{font-size:13px;font-weight:700;margin:3px 0}
  .cell-btn .cp{font-size:10px}
  .detail-grid{display:flex;flex-direction:column;gap:12px}
  .tbl{width:100%;font-size:11px;border-collapse:collapse}
  .tbl th{text-align:left;padding:7px 8px;color:#888;font-weight:700;border-bottom:1px solid #f0f0ec;font-size:11px;text-transform:uppercase}
  .tbl td{padding:9px 8px;border-bottom:1px solid #f0f0ec;color:#1a1a18;font-size:12px}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tr.clickable:hover td{background:#f0f8f0;cursor:pointer}
  .irow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f0f0ec}
  .irow:last-child{border-bottom:none}
  .diff-up{color:#A32D2D;font-size:10px;font-weight:700}
  .diff-dn{color:#27500A;font-size:10px;font-weight:700}
  .diff-eq{color:#888;font-size:10px}
  #drawer-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;justify-content:flex-end;align-items:flex-end}
  #drawer-box{background:#f4f4f0;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:80vh;overflow-y:auto;padding:20px;margin:0 auto}
  @media(max-width:600px){.detail-grid{grid-template-columns:1fr}}
</style>
</head>

var CELLS = ['01셀','02셀','03셀','04셀','05셀','06셀','07셀','08셀','09셀','10셀','11셀','12셀','13셀','14셀','15셀','16셀','17셀'];

// 탭 전환
var _chartDone = {};
function switchTab(week, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('tab-'+week).classList.add('active');
  if (!_chartDone[week]) { _chartDone[week]=true; buildChart(week); }
}

// 셀 버튼 생성
function buildCellGrid(week) {
  var avgs = week==='w1'?W1AVGS:W2AVGS;
  var pcts = week==='w1'?W1PCTS:W2PCTS;
  var grid = document.getElementById('cell-grid-'+week);
  CELLS.forEach(function(cell,i){
    var avg=avgs[i], pct=pcts[i];
    var ac=avg>=4.6?'#27500A':avg>=4.5?'#BA7517':'#A32D2D';
    var pc=pct>=4.5?'#A32D2D':pct>=3.5?'#BA7517':'#27500A';
    var btn=document.createElement('div');
    btn.className='cell-btn'; btn.dataset.cell=cell; btn.dataset.week=week;
    btn.innerHTML='<div class="cn">'+cell+'</div>'
      +'<div class="ca" style="color:'+ac+'">'+avg.toFixed(2)+'</div>'
      +'<div class="cp" style="color:'+pc+'">1-2점 '+pct+'%</div>';
    btn.onclick=function(){selectCell(week,cell);};
    grid.appendChild(btn);
  });
}
buildCellGrid('w1'); buildCellGrid('w2');

// 셀 선택
function selectCell(week, cell) {
  activeCell[week]=cell;
  document.querySelectorAll('#cell-grid-'+week+' .cell-btn').forEach(function(b){
    var on=b.dataset.cell===cell;
    b.classList.toggle('active',on);
    var i=CELLS.indexOf(b.dataset.cell);
    var avgs=week==='w1'?W1AVGS:W2AVGS, pcts=week==='w1'?W1PCTS:W2PCTS;
    var avg=avgs[i],pct=pcts[i];
    b.querySelector('.ca').style.color=on?'#fff':(avg>=4.6?'#27500A':avg>=4.5?'#BA7517':'#A32D2D');
    b.querySelector('.cp').style.color=on?'#ddd':(pct>=4.5?'#A32D2D':pct>=3.5?'#BA7517':'#27500A');
  });
  var data=CD[week][cell];
  if(!data) return;
  document.getElementById('detail-'+week).style.display='block';
  document.getElementById('detail-title-'+week).textContent=cell+' 매장별 현황';

  // 매장 테이블
  var tbody=document.getElementById('tbody-'+week);
  tbody.innerHTML='';
  data.stores.forEach(function(s){
    var ac=s.avg>=4.6?'#27500A':s.avg>=4.5?'#BA7517':'#A32D2D';
    var pc=s.low12_pct>=5?'#A32D2D':s.low12_pct>=3?'#BA7517':'#888';
    var tr=document.createElement('tr');
    if(s.low12>0){tr.className='clickable'; tr.onclick=function(){openDrawer(week,cell,s.name);};}
    var diffHtml='';
    if(week==='w2' && s.prev_avg!==null && s.prev_avg!==undefined){
      var ad=s.avg_diff, pd=s.pct_diff;
      var adStr=(ad>0?'▲':'▼')+Math.abs(ad).toFixed(2);
      var pdStr=(pd>0?'▲':'▼')+Math.abs(pd).toFixed(1)+'%p';
      var adCls=ad<0?'diff-dn':ad>0?'diff-up':'diff-eq';
      var pdCls=pd>0?'diff-up':pd<0?'diff-dn':'diff-eq';
      diffHtml='<td style="text-align:center"><span class="'+adCls+'">평점'+adStr+'</span><br><span class="'+pdCls+'">비율'+pdStr+'</span></td>';
    } else if(week==='w2'){
      diffHtml='<td style="text-align:center;color:#aaa;font-size:10px">-</td>';
    }
    tr.innerHTML='<td>'+s.name+(s.low12>0?'<span style="color:#aaa;font-size:9px;margin-left:3px">▶</span>':'')+'</td>'
      +'<td style="text-align:center;color:#888">'+s.total+'</td>'
      +'<td style="text-align:center;color:'+pc+';font-weight:700">'+s.low12+'</td>'
      +'<td style="text-align:center;color:'+pc+';font-weight:700">'+s.low12_pct+'%</td>'
      +'<td style="text-align:center;color:'+ac+';font-weight:700">'+s.avg+'</td>'
      +diffHtml;
    tbody.appendChild(tr);
  });



  // 셀 요약
  document.getElementById('summary-'+week).innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">'
    +'<div style="background:#f8f8f6;border-radius:8px;padding:10px"><p style="font-size:9px;color:#888;margin-bottom:3px">리뷰</p><p style="font-size:18px;font-weight:700">'+data.total+'건</p></div>'
    +'<div style="background:#EAF3DE;border-radius:8px;padding:10px"><p style="font-size:9px;color:#27500A;margin-bottom:3px">평균 평점</p><p style="font-size:18px;font-weight:700;color:#27500A">'+data.avg+'</p></div>'
    +'<div style="background:#FCEBEB;border-radius:8px;padding:10px"><p style="font-size:9px;color:#791F1F;margin-bottom:3px">1-2점 비율</p><p style="font-size:18px;font-weight:700;color:#A32D2D">'+data.low12_pct+'%</p></div>'
    +'</div>';
}

// 차트
function buildChart(week){
  var avgs=week==='w1'?W1AVGS:W2AVGS;
  var pcts=week==='w1'?W1PCTS:W2PCTS;
  new Chart(document.getElementById('chart-'+week),{
    data:{
      labels:CELLS,
      datasets:[
        {type:'bar',data:pcts,backgroundColor:'rgba(226,75,74,0.25)',borderColor:'#E24B4A',borderWidth:1,borderRadius:3,yAxisID:'y2'},
        {type:'line',data:avgs,borderColor:'#378ADD',backgroundColor:'#378ADD',pointRadius:5,tension:0.3,yAxisID:'y'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:30}},
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{font:{size:10},autoSkip:false},grid:{display:false}},
        y:{position:'left',min:4.3,max:4.85,ticks:{font:{size:9},stepSize:0.1},grid:{color:'rgba(0,0,0,.06)'}},
        y2:{position:'right',min:0,max:9,ticks:{font:{size:9},callback:function(v){return v+'%';}},grid:{display:false}}
      }
    },
    plugins:[{
      id:'lbl',
      afterDatasetsDraw:function(chart){
        var ctx=chart.ctx;
        // 막대(비율) — 막대 안 중앙
        var barMeta=chart.getDatasetMeta(0);
        barMeta.data.forEach(function(el,j){
          var v=pcts[j];
          var barH=el.base-el.y;
          ctx.save();
          ctx.font='bold 9px Arial';
          ctx.fillStyle='#A32D2D';
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          ctx.fillText(v+'%',el.x,el.y+barH/2);
          ctx.restore();
        });
        // 꺾은선(평점) — 점 위
        var lineMeta=chart.getDatasetMeta(1);
        lineMeta.data.forEach(function(el,j){
          ctx.save();
          ctx.font='bold 9px Arial';
          ctx.fillStyle='#0C447C';
          ctx.textAlign='center';
          ctx.textBaseline='bottom';
          ctx.fillText(avgs[j].toFixed(2),el.x,el.y-8);
          ctx.restore();
        });
      }
    }]
  });
}

// 드로어
function closeDrawer(){document.getElementById('drawer-overlay').style.display='none';}
function openDrawer(week,cell,store){
  var reviews=((CD[week]||{})[cell]||{}).reviews||{};
  var rvs=reviews[store]||[];
  var rc=function(r){return r<=1?'#A32D2D':r<=2?'#D85A30':'#BA7517';};
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div><p style="font-size:14px;font-weight:700">'+store+'</p>'
    +'<p style="font-size:10px;color:#888;margin-top:2px">1-2점 리뷰 · '+rvs.length+'건</p></div>'
    +'<button onclick="closeDrawer()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#888">&#x2715;</button></div>';
  if(!rvs.length){h+='<p style="color:#aaa;text-align:center;padding:20px;font-size:12px">리뷰 없음</p>';}
  else{rvs.forEach(function(rv){
    var d=rv.d?rv.d.slice(0,2)+'/'+rv.d.slice(2,4):'';
    h+='<div style="border:.5px solid #e0e0dc;border-radius:10px;padding:12px 14px;margin-bottom:8px;background:#fff">'
      +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">'
      +'<span style="font-size:13px;font-weight:700;color:'+rc(rv.r)+'">'+rv.r+'점</span>'
      +'<span style="font-size:10px;color:#aaa">'+d+'</span></div>'
      +'<p style="font-size:11px;color:#333;line-height:1.75;word-break:break-all">'+rv.t+'</p></div>';
  });}
  document.getElementById('drawer-content').innerHTML=h;
  document.getElementById('drawer-overlay').style.display='flex';
}

// 초기 차트
_chartDone['w1']=true; buildChart('w1');
</script>
